name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"       # real release:  v0.1.0
      - "v*.*.*rc*"    # release candidate: v0.1.0rc1
      - "v*.*.*b*"     # beta:           v0.1.0b1

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi     # GitHub environment — create this in repo Settings

    permissions:
      id-token: write         # required for OIDC trusted publishing

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
        # Trusted publisher setup on TestPyPI:
        #   https://test.pypi.org/manage/account/publishing/
        #   Same fields as PyPI but environment name = testpypi

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi   # only runs after TestPyPI succeeds
    runs-on: ubuntu-latest
    environment: pypi         # GitHub environment — create this in repo Settings

    # Only publish to real PyPI on clean version tags (not rc/beta)
    if: ${{ !contains(github.ref, 'rc') && !contains(github.ref, 'b') }}

    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Trusted publisher setup on PyPI:
        #   https://pypi.org/manage/account/publishing/
        #   environment name = pypi
